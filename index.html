<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="コード道場">
  <title>コード道場</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ========================================
       ホーム画面：トピック選択
  ======================================== -->
  <div id="screen-home" class="screen active">

    <div class="home-header">
      <div class="game-title">コード道場</div>
      <div class="game-subtitle">問題の種類を選んでください</div>
    </div>

    <!-- トピックカードのグリッド（JavaScriptで生成） -->
    <div id="topic-grid" class="topic-grid"></div>

  </div>


  <!-- ========================================
       単語一覧画面（トキポナ語）
  ======================================== -->
  <div id="screen-wordlist" class="screen">
    <div class="quiz-header">
      <button class="back-btn" onclick="goHome()">← 戻る</button>
      <div class="quiz-topic-name">トキポナ語 単語一覧</div>
      <div></div>
    </div>
    <div id="wordlist-container" class="wordlist-container"></div>
  </div>


  <!-- ========================================
       クイズ画面
  ======================================== -->
  <div id="screen-quiz" class="screen">

    <!-- ヘッダー -->
    <div class="quiz-header">
      <button class="back-btn" onclick="goHome()">← 戻る</button>
      <div id="quiz-topic-name" class="quiz-topic-name"></div>
      <div id="quiz-streak" class="quiz-streak">🔥 0</div>
    </div>

    <!-- 問題フェーズ -->
    <div id="quiz-question-phase">
      <div class="question-meta">
        <span id="question-counter" class="question-counter">問題 1</span>
        <span id="question-score" class="question-score">正解 0</span>
      </div>
      <div id="question-text" class="question-text"></div>
      <pre id="question-code" class="question-code hidden"></pre>
      <div id="quiz-choices" class="choices-list"></div>
    </div>

    <!-- 結果フェーズ -->
    <div id="quiz-result-phase" class="hidden">
      <div id="quiz-result-icon" class="result-icon"></div>
      <div id="quiz-result-message" class="result-message"></div>
      <pre id="quiz-result-code" class="question-code hidden"></pre>
      <div id="quiz-result-reading" class="result-reading hidden"></div>
      <div class="result-detail">
        <div id="quiz-correct-answer" class="correct-answer-label"></div>
        <div id="quiz-explanation" class="explanation-text"></div>
      </div>
      <button id="next-question-btn" class="next-btn" onclick="nextQuestion()">次の問題 ▶</button>
    </div>

  </div>


  <script src="words.js"></script>
  <script src="questions.js"></script>
  <script src="app.js"></script>
</body>
</html>
